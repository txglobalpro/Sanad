{% extends "base.html" %}
{% block title %}{{ t.ep_title }} - Sanad{% endblock %}
{% block content %}
<section class="section-padding">
  <div class="container">
    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="icon-circle" style="width:56px;height:56px;background:#ecfdf5;color:var(--secondary);font-size:1.5rem;">
            <i class="bi bi-plus-circle"></i>
          </div>
          <div>
            <h4 class="fw-bold mb-1">{{ t.ep_title }}</h4>
            <p class="text-secondary small mb-0">{{ t.ep_subtitle }}</p>
          </div>
        </div>

        <form id="jobForm">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">{{ t.ep_job_title }}</label>
              <input type="text" name="title" class="form-control" required placeholder="{{ t.ep_job_title_placeholder }}">
            </div>
            <div class="col-12">
              <label class="form-label">{{ t.ep_description }} <span class="text-muted">{{ t.ep_optional }}</span></label>
              <textarea name="description" class="form-control" rows="3" placeholder="{{ t.ep_description_placeholder }}"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.ep_work_type }}</label>
              <select name="work_type" class="form-select" required>
                <option value="">{{ t.ep_select }}</option>
                <option value="بناء وصيانة">بناء وصيانة</option>
                <option value="تنظيف">تنظيف</option>
                <option value="نقل وتوصيل">نقل وتوصيل</option>
                <option value="مطاعم وضيافة">مطاعم وضيافة</option>
                <option value="حدائق وزراعة">حدائق وزراعة</option>
                <option value="دهان وديكور">دهان وديكور</option>
                <option value="كهرباء">كهرباء</option>
                <option value="سباكة">سباكة</option>
                <option value="نجارة">نجارة</option>
                <option value="حدادة">حدادة</option>
                <option value="حراسة وأمن">حراسة وأمن</option>
                <option value="سائق">سائق</option>
                <option value="أعمال مكتبية">أعمال مكتبية</option>
                <option value="أخرى">أخرى</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.ep_duration }}</label>
              <select name="duration" class="form-select" required>
                <option value="">{{ t.ep_select }}</option>
                <option value="ساعة واحدة">ساعة واحدة</option>
                <option value="2-3 ساعات">2-3 ساعات</option>
                <option value="نصف يوم">نصف يوم</option>
                <option value="يوم كامل">يوم كامل</option>
                <option value="أكثر من يوم">أكثر من يوم</option>
                <option value="حسب الاتفاق">حسب الاتفاق</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.ep_pay }} <span class="text-muted">(ل.س)</span></label>
              <input type="number" name="pay" class="form-control" required min="1" placeholder="{{ t.ep_pay_placeholder }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.wjd_phone }}</label>
              <input type="text" name="phone" class="form-control" required placeholder="09xxxxxxxx">
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.register_city }}</label>
              <select name="city" class="form-select" required>
                <option value="">{{ t.ep_select }}</option>
                {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">{{ t.wjd_address }}</label>
              <input type="text" name="address" class="form-control" required placeholder="{{ t.ep_address_placeholder }}">
            </div>
            <div class="col-12">
              <label class="form-label">{{ t.wjd_notes }} <span class="text-muted">{{ t.ep_optional }}</span></label>
              <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-success mt-4 px-5 py-2">
            <i class="bi bi-send ms-1"></i>{{ t.ep_submit_btn }}
          </button>
        </form>
        <div id="jobMsg" class="mt-3"></div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const btn = form.querySelector('button');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm ms-1"></span>{{ t.ep_publishing }}';
  try {
    const res = await fetch('/api/employer/job', { method:'POST', body: fd });
    const json = await res.json();
    const msg = document.getElementById('jobMsg');
    if (json.success) {
      msg.innerHTML = '<div class="alert alert-success d-flex align-items-center gap-2"><i class="bi bi-check-circle-fill"></i>{{ t.ep_success }}</div>';
      form.reset();
      setTimeout(() => window.location.href = '/employer/dashboard', 1500);
    } else { msg.innerHTML = '<div class="alert alert-danger d-flex align-items-center gap-2"><i class="bi bi-x-circle-fill"></i>'+json.message+'</div>'; }
  } catch(e) { alert('{{ t.error_connection }}'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-send ms-1"></i>{{ t.ep_submit_btn }}'; }
});
</script>
{% endblock %}
