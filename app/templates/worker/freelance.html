{% extends "base.html" %}
{% block title %}{{ t.fr_title }} - Sanad{% endblock %}
{% block content %}
<section class="section-padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-lg border-0">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
              <div class="icon-circle" style="width:56px;height:56px;background:var(--primary-50);color:var(--primary);">
                <i class="bi bi-laptop fs-3"></i>
              </div>
              <div>
                <h4 class="fw-bold mb-1">{{ t.fr_title }}</h4>
                <p class="text-secondary small mb-0">{{ t.fr_subtitle }}</p>
              </div>
            </div>

            <form id="freelanceForm">
              <div class="mb-4">
                <div class="d-flex align-items-center justify-content-between p-3 rounded-3" style="background:var(--primary-50);">
                  <div>
                    <label class="fw-bold mb-0" for="availableToggle">{{ t.fr_available_label }}</label>
                    <p class="text-secondary small mb-0">{{ t.fr_available_desc }}</p>
                  </div>
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="availableToggle" name="available" value="1" style="width:3rem;height:1.5rem;cursor:pointer;" {% if worker.available_for_freelance %}checked{% endif %}>
                  </div>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold" for="hourlyRate">{{ t.fr_hourly_rate }}</label>
                <div class="input-group">
                  <input type="number" step="0.01" min="0" class="form-control" id="hourlyRate" name="hourly_rate" value="{{ worker.hourly_rate or '' }}" placeholder="{{ t.fr_hourly_placeholder }}">
                  <span class="input-group-text">{{ t.fr_currency }}</span>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold" for="freelanceDesc">{{ t.fr_description }}</label>
                <textarea class="form-control" id="freelanceDesc" name="freelance_desc" rows="5" placeholder="{{ t.fr_desc_placeholder }}">{{ worker.freelance_desc or '' }}</textarea>
              </div>

              <button type="submit" class="btn btn-primary px-4 w-100 w-md-auto">
                <i class="bi bi-check2 ms-1"></i>{{ t.fr_save_btn }}
              </button>
            </form>
            <div id="freelanceMsg" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('freelanceForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm ms-1"></span>';
  try {
    const res = await fetch('/api/worker/freelance/save', { method:'POST', body: fd });
    const json = await res.json();
    const msg = document.getElementById('freelanceMsg');
    if (json.success) {
      msg.innerHTML = '<div class="alert alert-success d-flex align-items-center gap-2"><i class="bi bi-check-circle-fill"></i>{{ t.fr_saved }}</div>';
    } else {
      msg.innerHTML = '<div class="alert alert-danger d-flex align-items-center gap-2"><i class="bi bi-x-circle-fill"></i>' + json.message + '</div>';
    }
  } catch(e) { alert('{{ t.error_connection }}'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check2 ms-1"></i>{{ t.fr_save_btn }}'; }
});
</script>
{% endblock %}
