{% extends "base.html" %}
{% block title %}{{ t.wpending_title }} - Sanad{% endblock %}
{% block content %}
<section class="hero-section bg-primary text-white">
  <div class="container">
    <h4 class="fw-bold mb-1">{{ t.wpending_title }}</h4>
    <p class="mb-0 opacity-75">{{ t.wpending_desc }}</p>
  </div>
</section>

<section class="section-padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center animate-fade-in-up">
        <div class="icon-circle mx-auto mb-4" style="width:80px;height:80px;background:#fffbeb;color:var(--accent);font-size:2rem;">
          <i class="bi bi-hourglass-split"></i>
        </div>
        <h3 class="fw-bold mb-3">{{ t.wpending_title }}</h3>
        <p class="text-secondary mb-4">{{ t.wpending_desc }}</p>
        <a href="/worker/profile" class="btn btn-primary btn-lg px-4">
          <i class="bi bi-person ms-2"></i>{{ t.wpending_btn }}
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
